name: home_plates
description: "HomePlates - A premium marketplace connecting talented home chefs with local food enthusiasts. Experience authentic, home-cooked meals delivered to your doorstep."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Backend & Auth
  supabase_flutter: ^2.3.5
  
  # Offline-first & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # UI & Media
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Utilities
  connectivity_plus: ^5.0.2
  timeago: ^3.6.1
  uuid: ^4.3.3
  path: ^1.9.0
  collection: ^1.18.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_local_notifications: ^17.1.2
  timeline_tile: ^2.0.0
  url_launcher: ^6.2.5
  geolocator: ^11.0.0
  
  # Features
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  flutter_lints: ^5.0.0
  
  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
